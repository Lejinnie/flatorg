include: package:lint_hard/all.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    prefer_single_quotes: true
    # Disabled: requires debugFillProperties boilerplate on every widget class,
    # which adds no correctness value for this application.
    diagnostic_describe_all_properties: false
    # Disabled: 80-char limit is impractical for Flutter's deeply nested widget
    # trees and long string constants; no line-length limit is enforced.
    lines_longer_than_80_chars: false
