<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Android adaptive foreground layer: 108dp canvas, safe zone = central 66dp circle -->
  <!-- Artwork centred with 14% padding (≈15dp each side), so effective canvas ≈ 78dp -->
  <!-- Scale the 100×100 logical box to 78dp, centred: offset = (108-78)/2 = 15 -->
  <g transform="translate(15, 15) scale(0.78)">

    <!-- House outline -->
    <polygon points="22,50 50,26 78,50 78,74 22,74"
      fill="none" stroke="white" stroke-width="5"
      stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Door -->
    <rect x="44" y="56" width="12" height="18" rx="1.5" fill="white"/>

    <!-- Broom group -->
    <g transform="rotate(-20, 30, 60)">
      <rect x="28" y="30" width="4" height="32" rx="2" fill="white"/>
      <rect x="24" y="60" width="12" height="4" rx="1" fill="white"/>
      <polygon points="22,64 38,64 44,80 16,80" fill="white"/>
    </g>

    <!-- Sparkle star -->
    <path d="M76 28 l1.5 4.5 4.5 1.5 -4.5 1.5 -1.5 4.5 -1.5 -4.5 -4.5 -1.5 4.5 -1.5z" fill="white"/>

    <!-- Sparkle dot -->
    <circle cx="68" cy="42" r="1.6" fill="white"/>

  </g>
</svg>
