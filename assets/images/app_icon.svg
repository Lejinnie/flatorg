<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="70.7%" y2="70.7%" gradientTransform="rotate(140, 0.5, 0.5)">
      <stop offset="0%" stop-color="#F0A06B"/>
      <stop offset="100%" stop-color="#D87740"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- All artwork in a 100×100 logical box centred on 1024×1024 -->
  <!-- Scale factor: 1024/100 = 10.24, origin offset: 0,0 -->
  <g transform="scale(10.24)">

    <!-- House outline: M22 50 L50 26 L78 50 L78 74 L22 74 Z -->
    <polygon points="22,50 50,26 78,50 78,74 22,74"
      fill="none" stroke="white" stroke-width="5"
      stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Door: x44 y56 w12 h18 rx1.5 -->
    <rect x="44" y="56" width="12" height="18" rx="1.5" fill="white"/>

    <!-- Broom group — rotated -20° around (30,60) -->
    <g transform="rotate(-20, 30, 60)">
      <!-- Handle -->
      <rect x="28" y="30" width="4" height="32" rx="2" fill="white"/>
      <!-- Binding band -->
      <rect x="24" y="60" width="12" height="4" rx="1" fill="white"/>
      <!-- Bristle fan trapezoid -->
      <polygon points="22,64 38,64 44,80 16,80" fill="white"/>
      <!-- Striations (5 vertical lines across bristles) -->
      <line x1="22" y1="66" x2="20" y2="79" stroke="rgba(228,142,92,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="26" y1="66" x2="25" y2="79" stroke="rgba(228,142,92,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="30" y1="66" x2="30" y2="79" stroke="rgba(228,142,92,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="34" y1="66" x2="35" y2="79" stroke="rgba(228,142,92,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="38" y1="66" x2="40" y2="79" stroke="rgba(228,142,92,0.55)" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Sparkle 4-point star at (76,28) -->
    <path d="M76 28 l1.5 4.5 4.5 1.5 -4.5 1.5 -1.5 4.5 -1.5 -4.5 -4.5 -1.5 4.5 -1.5z" fill="white"/>

    <!-- Sparkle dot at (68,42) r1.6 -->
    <circle cx="68" cy="42" r="1.6" fill="white"/>

  </g>
</svg>
