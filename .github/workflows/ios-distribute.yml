name: iOS Distribute

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.2.3+4)"
        required: true
      release_notes:
        description: "Release notes for Firebase App Distribution"
        required: true
      group:
        description: "Distribution group (testing or hwb-33)"
        required: true
        default: "testing"

jobs:
  build-and-distribute:
    name: Build iOS IPA & distribute
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Apple certificate and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode secrets to files.
          echo "$IOS_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision

          # Create and configure temporary keychain.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate.
          security import $RUNNER_TEMP/cert.p12 \
            -P "$IOS_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Inject Apple Team ID into ExportOptions
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: sed -i '' "s/__TEAM_ID__/$APPLE_TEAM_ID/" ios/ExportOptions.plist

      - name: Install GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Switch entitlements to production
        run: sed -i '' 's/development/production/' ios/Runner/Runner.entitlements

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute IPA via Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute build/ios/ipa/*.ipa \
            --app "1:854474953690:ios:ec48e33af8dd4f5aafa6e3" \
            --groups "${{ inputs.group }}" \
            --release-notes "${{ inputs.release_notes }}" \
            --token "$FIREBASE_TOKEN"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
