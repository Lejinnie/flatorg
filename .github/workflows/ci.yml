name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python — ruff (lint + format check) and mypy (strict type checking)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions_python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: functions_python/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy .

  # ---------------------------------------------------------------------------
  # Flutter — static analysis with fatal infos
  # ---------------------------------------------------------------------------
  flutter-lint:
    name: Flutter lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --fatal-infos
