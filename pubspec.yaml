name: flatorg
description: A Flutter app for scheduling and managing household tasks in a co-living area.
publish_to: 'none'
version: 1.1.9+31

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter:
    sdk: flutter
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  sign_in_with_apple: ^6.1.4
  url_launcher: ^6.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - email_templates/issue_template_1.txt
    - email_templates/issue_template_2.txt
    - email_templates/issue_template_3.txt

dev_dependencies:
  fake_cloud_firestore: ^3.0.3
  firebase_core_platform_interface: ^6.0.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  lint_hard: ^7.1.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/logo.png'
  min_sdk_android: 21
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: 'assets/images/logo.png'

flutter_native_splash:
  color: '#FFFFFF'
  color_dark: '#121212'
  image: 'assets/images/logo.png'
  android: true
  ios: true
