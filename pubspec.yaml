name: flatorg
description: A Flutter app for scheduling and managing household tasks in a co-living area.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  intl: ^0.19.0
  go_router: ^14.6.2
  provider: ^6.1.2

flutter:
  assets:
    - email_templates/issue_template_1.txt
    - email_templates/issue_template_2.txt
    - email_templates/issue_template_3.txt

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
