[mypy]
python_version = 3.12
strict = true
ignore_missing_imports = true
# firebase_admin ships without type stubs or py.typed — suppress the warning.
# import-untyped: firebase_admin has no py.typed marker.
# unused-ignore: deepl stubs are only present when the package is installed,
#   so type: ignore[arg-type] in translate_issues_trigger is unavoidably
#   environment-specific.
disable_error_code = import-untyped,unused-ignore
# Never scan Flutter/Android generated files when mypy is run from the
# workspace root (e.g. via the VS Code extension or a plain `mypy .`).
exclude = ios/|android/
