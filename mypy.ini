[mypy]
python_version = 3.12
strict = true
ignore_missing_imports = true
# firebase_admin ships without type stubs or py.typed — suppress the warning.
disable_error_code = import-untyped
# Never scan Flutter/Android generated files when mypy is run from the
# workspace root (e.g. via the VS Code extension or a plain `mypy .`).
exclude = ios/|android/
